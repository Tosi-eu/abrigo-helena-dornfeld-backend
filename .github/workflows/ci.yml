name: CI

on:
  push:
    branches: [main, dev, test]
  pull_request:
    branches: [main, dev, test]

jobs:
  lint-and-format:
    name: ESLint + Prettier (check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:check

      - name: Prettier (format check)
        run: npm run format:check

  test:
    name: Unit + E2E (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.CI_DB_USER }} -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: ${{ secrets.CI_NODE_ENV }}
      DB_HOST: ${{ secrets.CI_DB_HOST }}
      DB_PORT: ${{ secrets.CI_DB_PORT }}
      DB_USER: ${{ secrets.CI_DB_USER }}
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      TEST_DB_NAME: ${{ secrets.CI_TEST_DB_NAME }}
      DB_NAME: ${{ secrets.CI_TEST_DB_NAME }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      ALLOWED_ORIGINS: ${{ secrets.CI_ALLOWED_ORIGINS }}
      X_API_KEY: ${{ secrets.CI_X_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: npm run test:db:create

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
